name: CI

# Free CI on GitHub Actions (no paid services). Runs the unit tests and the
# production build on every push and pull request.
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build
